  <style id="app-css">
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#080808;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;color:#f0ebe0;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
input,textarea,button{font-family:'DM Sans',sans-serif;-webkit-appearance:none;border-radius:0;}

/* ── AUTH ── */
.auth-wrap{min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;padding:env(safe-area-inset-top,24px) 24px 40px;overflow-y:auto;background:#060606;position:relative;}
.auth-bg{position:fixed;inset:0;background:radial-gradient(ellipse 100% 50% at 50% -10%,#281a08,transparent 60%);pointer-events:none;}
.auth-card{position:relative;z-index:1;width:100%;max-width:400px;padding-top:32px;}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.auth-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#c9a96e18,#c9a96e44);border:1px solid #c9a96e33;display:flex;align-items:center;justify-content:center;}
.auth-wm{font-family:'Cormorant Garamond',serif;font-size:20px;color:#e8e3d8;letter-spacing:.06em;}
.auth-h{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:#f0ebe0;line-height:1.2;margin-bottom:6px;}
.auth-h em{font-style:italic;color:#c9a96e;}
.auth-sub{font-size:13px;color:#555;margin-bottom:24px;line-height:1.6;}
.auth-f{margin-bottom:13px;}
.auth-f label{display:block;font-size:10px;color:#555;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.auth-in{width:100%;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:11px;padding:14px 15px;color:#e8e3d8;font-size:16px;outline:none;transition:border-color .2s;}
.auth-in:focus{border-color:#c9a96e44;box-shadow:0 0 0 3px #c9a96e08;}
.auth-in::placeholder{color:#333;}
.auth-pw{position:relative;}
.auth-pw .auth-in{padding-right:48px;}
.auth-pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:#484848;cursor:pointer;display:flex;padding:6px;}
.auth-btn{width:100%;padding:15px;border-radius:11px;border:none;background:linear-gradient(135deg,#c9a96e,#9a6e22);color:#0a0a0a;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:opacity .2s;}
.auth-btn:disabled{opacity:.5;}
.auth-btn:active:not(:disabled){opacity:.8;}
.auth-switch{font-size:13px;color:#555;text-align:center;margin-top:16px;}
.auth-switch button{background:none;border:none;color:#c9a96e;cursor:pointer;font-size:13px;padding:0;}
.auth-err{background:#160808;border:1px solid #331212;border-radius:9px;padding:10px 13px;font-size:13px;color:#c97070;margin-bottom:13px;}
.auth-ok{background:#091409;border:1px solid #1a3a1a;border-radius:9px;padding:10px 13px;font-size:13px;color:#6db87a;margin-bottom:13px;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.auth-divider span{font-size:11px;color:#333;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#1e1e1e;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100dvh;background:#060606;overflow:hidden;}

/* ── TOP BAR (mobile) ── */
.topbar{display:flex;align-items:center;padding:0 16px;height:52px;padding-top:env(safe-area-inset-top,0);background:#0a0a0a;border-bottom:1px solid #141414;flex-shrink:0;gap:10px;}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:#f0ebe0;flex:1;}
.topbar-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#c9a96e14,#c9a96e38);border:1px solid #c9a96e2a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

/* ── CONTENT AREA ── */
.content{flex:1;overflow:hidden;position:relative;display:flex;}

/* ── BOTTOM NAV ── */
.bottomnav{display:flex;align-items:center;background:#0a0a0a;border-top:1px solid #141414;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;background:none;border:none;color:#484848;cursor:pointer;position:relative;min-height:52px;}
.bnb.on{color:#c9a96e;}
.bnb span{font-size:9px;font-weight:500;letter-spacing:.02em;}
.bnb .bdg{position:absolute;top:8px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:#c9703a;border:1.5px solid #0a0a0a;}

/* ── PANELS & SLIDES ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#090909;overflow:hidden;}
.slide{position:absolute;inset:0;background:#090909;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:10;display:flex;flex-direction:column;overflow:hidden;}
.slide.open{transform:translateX(0);}

/* ── SCREEN HEADER ── */
.sh{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #141414;background:#0a0a0a;flex-shrink:0;}
.sh-back{background:none;border:none;color:#c9a96e;cursor:pointer;display:flex;align-items:center;padding:2px;margin-right:2px;}
.sh-title{font-size:15px;font-weight:500;color:#eee8dd;flex:1;}
.sh-action{background:none;border:none;cursor:pointer;color:#c9a96e;font-size:13px;font-weight:500;padding:4px 8px;}

/* ── LIST ITEMS ── */
.li{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid #0e0e0e;active-color:#111;}
.li:active{background:#111;}

/* ── MESSAGES ── */
.ca{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
.msg{display:flex;gap:8px;max-width:80%;}
.msg.me{flex-direction:row-reverse;align-self:flex-end;}
.bbl{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg .bbl{background:#141414;color:#d8d3c8;border-bottom-left-radius:4px;}
.msg.me .bbl{background:linear-gradient(135deg,#241c0f,#342812);color:#efe7cf;border-bottom-right-radius:4px;border:1px solid #c9a96e22;}
.mt{font-size:10px;color:#333;margin-top:3px;}
.msg.me .mt{text-align:right;}
.ia{padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid #141414;background:#0a0a0a;flex-shrink:0;}
.ir{display:flex;gap:8px;align-items:flex-end;background:#0e0e0e;border:1px solid #1c1c1c;border-radius:22px;padding:8px 8px 8px 14px;}
.ci{flex:1;background:transparent;border:none;outline:none;color:#ddd8cc;font-size:16px;line-height:1.45;resize:none;max-height:100px;padding:2px 0;}
.sb{width:34px;height:34px;border-radius:50%;border:none;background:linear-gradient(135deg,#c9a96e,#9a6e22);color:#0a0a0a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb:active{opacity:.8;}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s;}
.btn:active{opacity:.7;}
.gold{background:linear-gradient(135deg,#c9a96e,#9a6e22);color:#0a0a0a;}
.gold:disabled{opacity:.35;cursor:not-allowed;}
.ghost{background:transparent;border:1px solid #282828;color:#888;}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.sheet{background:#0d0d0d;border:1px solid #1c1c1c;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px);}
.sheet-handle{width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:12px auto 0;}
.mhdr{padding:16px 18px 12px;border-bottom:1px solid #141414;display:flex;justify-content:space-between;align-items:center;}
.mbody{padding:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:#555;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.field input,.field textarea{width:100%;background:#080808;border:1px solid #1c1c1c;border-radius:10px;padding:12px 13px;color:#ddd8cc;font-size:16px;outline:none;transition:border-color .18s;}
.field input:focus,.field textarea:focus{border-color:#c9a96e44;}
.field textarea{resize:none;min-height:72px;line-height:1.5;}

/* ── MISC ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:40px 24px;}
.empty p{font-size:13px;color:#3a3a3a;max-width:200px;line-height:1.7;}
.fade{animation:fd .22s ease both;}
@keyframes fd{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.tg{background:#0b1d0f;color:#6db87a;border:1px solid #1c4828;}
.tm{background:#181200;color:#d4a84b;border:1px solid #443810;}
.ti{background:#0e0e0e;color:#555;border:1px solid #222;}
.warn{font-size:12px;color:#d4a84b;padding:9px 12px;background:#141000;border:1px solid #3a2a00;border-radius:9px;margin-bottom:12px;}
.ok-msg{font-size:12px;color:#6db87a;padding:9px 12px;background:#091409;border:1px solid #1a3a1a;border-radius:9px;margin-bottom:12px;}
.spin{animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.loader{display:flex;align-items:center;justify-content:center;height:100%;}
.cov-a{background:linear-gradient(135deg,#18082a,#2c1948,#7a3a5e);}
.cov-b{background:linear-gradient(135deg,#180808,#621a0e,#b85a28);}
.cov-c{background:linear-gradient(135deg,#081408,#1e4018,#5a8840);}
.cov-d{background:linear-gradient(135deg,#08081a,#181848,#38287a);}
.cov-e{background:linear-gradient(135deg,#141008,#3a2c08,#8a7028);}
.evc{background:#0c0c0c;border:1px solid #181818;border-radius:13px;overflow:hidden;margin-bottom:9px;cursor:pointer;transition:border-color .15s;active-color:#111;}
.evc:active{border-color:#c9a96e44;}
.ecv{height:56px;}
.ecb{padding:10px 12px;}
.st{background:#0c0c0c;border:1px solid #181818;border-radius:10px;padding:12px;text-align:center;}
.nrow{padding:14px 16px;border-bottom:1px solid #0e0e0e;display:flex;gap:11px;align-items:flex-start;cursor:pointer;}
.nrow.ur{background:#0c0b07;}
.ndot{width:6px;height:6px;border-radius:50%;background:#c9a96e;flex-shrink:0;margin-top:6px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.pc{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;}
.pc img{width:100%;height:100%;object-fit:cover;}
.pc-color{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.pov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
.lbar{background:#091409;border-bottom:1px solid #142014;padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pulse{animation:pls 2s infinite;}
@keyframes pls{0%,100%{opacity:1;}50%{opacity:.4;}}
.desktop-sidebar{display:none;}
.desk-panel{display:flex;flex-direction:column;width:100%;border-right:none;}
.desk-main{display:none;}
.fr-req{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #0e0e0e;background:#0c0b07;}
/* photo upload area */
.upload-area{border:2px dashed #252525;border-radius:14px;overflow:hidden;margin-bottom:14px;cursor:pointer;position:relative;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080808;}
.upload-area.has-img{border-style:solid;border-color:#c9a96e33;}
.upload-area img{width:100%;max-height:260px;object-fit:contain;}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* ── RSVP guest list ── */
.rsvp-section{margin-top:20px;}
.rsvp-label{font-size:10px;color:#484848;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.rsvp-person{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #111;}
.rsvp-person:last-child{border-bottom:none;}

/* ════════════════════
   DESKTOP (≥ 768px)
════════════════════ */
@media(min-width:768px){
  /* hide mobile chrome, show desktop sidebar */
  .topbar{display:none;}
  .bottomnav{display:none;}

  .app{flex-direction:row;}

  /* ── SIDEBAR ── */
  .desktop-sidebar{display:flex !important;flex-direction:column;width:220px;background:#0a0a0a;border-right:1px solid #141414;padding:24px 0 20px;flex-shrink:0;height:100dvh;}
  .ds-logo{display:flex;align-items:center;gap:10px;padding:0 20px 28px;}
  .ds-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#c9a96e14,#c9a96e38);border:1px solid #c9a96e2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ds-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:#e8e3d8;letter-spacing:.04em;}
  .ds-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:0 10px;}
  .ds-btn{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:#484848;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;width:100%;text-align:left;position:relative;transition:background .14s,color .14s;}
  .ds-btn:hover{background:#141414;color:#ccc;}
  .ds-btn.on{background:#1a140a;color:#c9a96e;}
  .ds-btn .bdg{position:absolute;top:10px;right:10px;width:7px;height:7px;border-radius:50%;background:#c9703a;border:1.5px solid #0a0a0a;}
  .ds-divider{height:1px;background:#141414;margin:12px 20px;}
  .ds-profile{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;}
  .ds-profile-name{font-size:13px;color:#888;font-weight:500;}
  .ds-profile-un{font-size:11px;color:#3a3a3a;}

  /* ── DESKTOP CONTENT AREA ── */
  .content{flex:1;display:flex;overflow:hidden;}

  /* On desktop, slide transitions become side-by-side panels */
  .screen{position:relative;inset:auto;display:flex;flex-direction:row;flex:1;overflow:hidden;}

  /* Left list panel */
  .desk-panel{width:300px;border-right:1px solid #141414;display:flex !important;flex-direction:column;flex-shrink:0;background:#0a0a0a;overflow:hidden;}
  .desk-main{display:flex !important;flex-direction:column;flex:1;background:#090909;overflow:hidden;}
  .desk-panel-hdr{padding:18px 18px 12px;border-bottom:1px solid #141414;display:flex;align-items:center;justify-content:space-between;}
  .desk-panel-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:#f0ebe0;}
  .desk-panel-body{flex:1;overflow-y:auto;}

  /* Right detail/main area */
  .desk-main{flex:1;display:flex;flex-direction:column;background:#090909;overflow:hidden;}

  /* Hide slide elements on desktop — use side-by-side instead */
  .slide{position:relative;inset:auto;transform:none !important;transition:none;background:#090909;flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .sh{display:none;}

  /* Desktop event detail scroll area */
  .desk-ev-detail{flex:1;overflow-y:auto;}

  /* Modals center on desktop */
  .ov{align-items:center;padding:20px;}
  .sheet{border-radius:16px;max-height:88vh;}
  .sheet-handle{display:none;}

  /* Photos grid: 3 columns on desktop */
  .pgrid{grid-template-columns:repeat(3,1fr);gap:3px;}

  /* Scrollbar on desktop */
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:#1e1e1e;}

  /* li hover state on desktop */
  .li:hover{background:#0e0e0e;}
  .evc:hover{border-color:#c9a96e33;}
}
  </style>
</head>

    </div>
  );
}

    send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    pin:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
    heart:<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    heartF:<path fill={c} d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    back:<polyline points="15 18 9 12 15 6"/>,
    location:<><circle cx="12" cy="12" r="3"/><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/></>,
    map:<><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
    logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    camera:<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
    eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    eyeOff:<><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
    user:<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{p[n]}</svg>;
};

/* ════════════════════════════════════════
   AUTH
════════════════════════════════════════ */
function AuthScreen(){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [name,setName]=useState("");
  const [username,setUN]=useState("");
  const [bio,setBio]=useState("");
  const [location,setLoc]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");

  const submit=async()=>{
    setErr("");setOk("");
    if(!email.trim()){setErr("Email is required.");return;}
    if(mode==="forgot"){
      setLoading(true);
      try{await auth.sendPasswordResetEmail(email.trim());setOk("Reset email sent — check your inbox.");}
      catch(e){setErr(e.message);}
      setLoading(false);return;
    }
    if(!pass){setErr("Password is required.");return;}
    setLoading(true);
    try{
      if(mode==="register"){
        if(!name.trim()){setErr("Please enter your name.");setLoading(false);return;}
        if(!username.trim()){setErr("Please choose a username.");setLoading(false);return;}
        if(/\s/.test(username)){setErr("No spaces in username.");setLoading(false);return;}
        if(pass.length<6){setErr("Password must be at least 6 characters.");setLoading(false);return;}
        const un=username.trim().toLowerCase();
        let cred;
        try{cred=await auth.createUserWithEmailAndPassword(email.trim(),pass);}
        catch(ae){const m={"auth/email-already-in-use":"Email already registered.","auth/weak-password":"Password must be at least 6 characters.","auth/invalid-email":"Invalid email."};setErr(m[ae.code]||ae.message);setLoading(false);return;}
        try{
          const snap=await db.collection("users").where("username","==",un).limit(1).get();
          if(!snap.empty){await cred.user.delete();setErr("Username already taken.");setLoading(false);return;}
          await cred.user.updateProfile({displayName:name.trim()});
          await db.collection("users").doc(cred.user.uid).set({uid:cred.user.uid,displayName:name.trim(),username:un,bio:bio.trim(),location:location.trim(),email:email.trim(),online:true,createdAt:nowTs()});
        }catch(de){try{await cred.user.delete();}catch(_){}setErr("Could not save profile: "+de.message);setLoading(false);return;}
      }else{
        await auth.signInWithEmailAndPassword(email.trim(),pass);
        const u=auth.currentUser;
        if(u){try{await db.collection("users").doc(u.uid).update({online:true});}catch(_){}}
      }
    }catch(e){
      const m={"auth/email-already-in-use":"Email already registered.","auth/wrong-password":"Incorrect password.","auth/user-not-found":"No account found.","auth/invalid-credential":"Incorrect email or password.","auth/invalid-email":"Invalid email."};
      setErr(m[e.code]||e.message);
    }
    setLoading(false);
  };

  return(
    <div className="auth-wrap">
      <div className="auth-bg"/>
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-mark"><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#c9a96e",lineHeight:1}}>✦</span></div>
          <span className="auth-wm">Cercle</span>
        </div>
        {mode==="login"&&<><h1 className="auth-h">Welcome<br/><em>back.</em></h1><p className="auth-sub">Sign in to your circle.</p></>}
        {mode==="register"&&<><h1 className="auth-h">Join<br/><em>Cercle.</em></h1><p className="auth-sub">Create your private circle.</p></>}
        {mode==="forgot"&&<><h1 className="auth-h">Reset your<br/><em>password.</em></h1><p className="auth-sub">We'll send a link to your email.</p></>}
        {err&&<div className="auth-err">{err}</div>}
        {ok&&<div className="auth-ok">{ok}</div>}
        {mode==="register"&&<>
          <div className="auth-f"><label>Full name</label><input className="auth-in" placeholder="Sofia Laurent" value={name} onChange={e=>setName(e.target.value)} autoComplete="name"/></div>
          <div className="auth-f"><label>Username</label>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#484848",fontSize:15}}>@</span>
              <input className="auth-in" style={{paddingLeft:26}} placeholder="yourname" value={username} onChange={e=>setUN(e.target.value.replace(/\s/g,"").toLowerCase())} autoComplete="username"/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="auth-f"><label>Location <span style={{color:"#2a2a2a",fontSize:9}}>opt.</span></label><input className="auth-in" placeholder="Brussels" value={location} onChange={e=>setLoc(e.target.value)}/></div>
            <div className="auth-f"><label>Bio <span style={{color:"#2a2a2a",fontSize:9}}>opt.</span></label><input className="auth-in" placeholder="Hey there" value={bio} onChange={e=>setBio(e.target.value)}/></div>
          </div>
          <div className="auth-divider"><span>account</span></div>
        </>}
        <div className="auth-f"><label>Email</label><input className="auth-in" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" inputMode="email"/></div>
        {mode!=="forgot"&&<div className="auth-f"><label>Password</label>
          <div className="auth-pw">
            <input className="auth-in" type={showPw?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} autoComplete={mode==="login"?"current-password":"new-password"} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <button className="auth-pw-toggle" onClick={()=>setShowPw(p=>!p)}><I n={showPw?"eyeOff":"eye"} s={17}/></button>
          </div>
        </div>}
        <button className="auth-btn" onClick={submit} disabled={loading}>
          {loading?<svg className="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
            :mode==="login"?"Sign in":mode==="register"?"Create account":"Send reset link"}
        </button>
        {mode==="login"&&<div className="auth-switch" style={{marginTop:10}}><button onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Forgot password?</button></div>}
        <div className="auth-switch">
          {mode==="login"?<><span>No account? </span><button onClick={()=>{setMode("register");setErr("");setOk("");}}>Create one</button></>
            :mode==="register"?<><span>Already have one? </span><button onClick={()=>{setMode("login");setErr("");setOk("");}}>Sign in</button></>
            :<button onClick={()=>{setMode("login");setErr("");setOk("");}}>Back to sign in</button>}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   MAIN APP
════════════════════════════════════════ */
function MainApp({me}){
  const [tab,setTab]=useState("chat");
  const [friends,setFriends]=useState([]);
  const [requests,setRequests]=useState([]);
  const [activeChat,setActiveChat]=useState(null);
  const [messages,setMessages]=useState([]);
  const [events,setEvents]=useState([]);
  const [activeEv,setActiveEv]=useState(null);
  const [photos,setPhotos]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [viewUser,setViewUser]=useState(null);
  const [modal,setModal]=useState(null);
  const [txt,setTxt]=useState("");
  const [sharingLoc,setSharingLoc]=useState(false);
  const [fSearch,setFSearch]=useState("");
  const [searchQ,setSearchQ]=useState("");
  const [searchRes,setSearchRes]=useState(null);
  const [searchErr,setSearchErr]=useState("");
  const [searchMsg,setSearchMsg]=useState("");
  const [nEv,setNEv]=useState({title:"",date:"",time:"",location:"",description:""});
  const [pCap,setPCap]=useState("");
  const [pImg,setPImg]=useState(null); // base64 data url
  const [pUploading,setPUploading]=useState(false);
  const endRef=useRef(null);

  /* ── presence ── */
  useEffect(()=>{
    db.collection("users").doc(me.uid).update({online:true}).catch(()=>{});
    return()=>{db.collection("users").doc(me.uid).update({online:false}).catch(()=>{});};
  },[me.uid]);

  /* ── friends ── */
  useEffect(()=>{
    const unsub=db.collection("users").doc(me.uid).collection("friends").onSnapshot(async snap=>{
      const uids=snap.docs.map(d=>d.id);
      if(!uids.length){setFriends([]);return;}
      const chunks=[];for(let i=0;i<uids.length;i+=10)chunks.push(uids.slice(i,i+10));
      const all=[];for(const chunk of chunks){const s=await db.collection("users").where("uid","in",chunk).get();s.docs.forEach(d=>all.push(d.data()));}
      setFriends(all);
    });return unsub;
  },[me.uid]);

  /* ── friend requests ── */
  useEffect(()=>{
    const unsub=db.collection("users").doc(me.uid).collection("friendRequests").where("status","==","pending")
      .onSnapshot(async snap=>{
        const reqs=await Promise.all(snap.docs.map(async d=>{const p=await db.collection("users").doc(d.id).get();return{...d.data(),uid:d.id,...p.data()};}));
        setRequests(reqs);
      });return unsub;
  },[me.uid]);

  /* ── messages ── */
  useEffect(()=>{
    if(!activeChat){setMessages([]);return;}
    const cid_=activeChat.type==="dm"?chatId(me.uid,activeChat.id):activeChat.id;
    const unsub=db.collection("chats").doc(cid_).collection("messages").orderBy("createdAt","asc")
      .onSnapshot(snap=>{setMessages(snap.docs.map(d=>({id:d.id,...d.data()})));});
    return unsub;
  },[activeChat,me.uid]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  /* ── events ── */
  useEffect(()=>{
    const unsub=db.collection("events").where("memberUids","array-contains",me.uid)
      .onSnapshot(snap=>{const evs=snap.docs.map(d=>({id:d.id,...d.data()}));evs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));setEvents(evs);});
    return unsub;
  },[me.uid]);

  /* ── photos ── */
  useEffect(()=>{
    const uids=[me.uid,...friends.map(f=>f.uid)];
    const unsub=db.collection("photos").where("ownerUid","in",uids.slice(0,10))
      .onSnapshot(snap=>{const phs=snap.docs.map(d=>({id:d.id,...d.data()}));phs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));setPhotos(phs);});
    return unsub;
  },[me.uid,friends.length]);

  /* ── notifications ── */
  useEffect(()=>{
    const unsub=db.collection("users").doc(me.uid).collection("notifications").orderBy("createdAt","desc").limit(30)
      .onSnapshot(snap=>setNotifs(snap.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  },[me.uid]);

  /* ── actions ── */
  const sendMessage=async()=>{
    if(!txt.trim()||!activeChat)return;
    const cid_=activeChat.type==="dm"?chatId(me.uid,activeChat.id):activeChat.id;
    const text=txt.trim();setTxt("");
    await db.collection("chats").doc(cid_).collection("messages").add({from:me.uid,fromName:me.displayName,text,createdAt:nowTs()});
    await db.collection("chats").doc(cid_).set({lastMessage:text,lastAt:nowTs(),members:activeChat.type==="dm"?[me.uid,activeChat.id]:[]},{merge:true});
  };

  const searchUser=async()=>{
    setSearchErr("");setSearchRes(null);setSearchMsg("");
    const q=searchQ.trim().toLowerCase();
    if(!q)return;
    if(q===(me.username||"").toLowerCase()){setSearchErr("That's your own username.");return;}
    const snap=await db.collection("users").where("username","==",q).limit(1).get();
    if(snap.empty){setSearchErr("No user found with that username.");return;}
    const user=snap.docs[0].data();
    if(friends.find(f=>f.uid===user.uid)){setSearchErr("Already in your circle.");return;}
    setSearchRes(user);
  };

  const sendFriendRequest=async(toUser)=>{
    await db.collection("users").doc(toUser.uid).collection("friendRequests").doc(me.uid)
      .set({from:me.uid,fromName:me.displayName,status:"pending",createdAt:nowTs()});
    await db.collection("users").doc(toUser.uid).collection("notifications")
      .add({type:"friendRequest",from:me.uid,fromName:me.displayName,text:me.displayName+" sent you a friend request.",unread:true,createdAt:nowTs()});
    setSearchMsg("Friend request sent to @"+toUser.username+"!");setSearchRes(null);
  };

  const acceptRequest=async(req)=>{
    const batch=db.batch();
    batch.set(db.collection("users").doc(me.uid).collection("friends").doc(req.uid),{since:nowTs()});
    batch.set(db.collection("users").doc(req.uid).collection("friends").doc(me.uid),{since:nowTs()});
    batch.update(db.collection("users").doc(me.uid).collection("friendRequests").doc(req.uid),{status:"accepted"});
    await batch.commit();
    await db.collection("users").doc(req.uid).collection("notifications").add({type:"friendAccepted",from:me.uid,fromName:me.displayName,text:me.displayName+" accepted your friend request.",unread:true,createdAt:nowTs()});
  };

  const declineRequest=async(req)=>{
    await db.collection("users").doc(me.uid).collection("friendRequests").doc(req.uid).update({status:"declined"});
  };

  const createEvent=async()=>{
    if(!nEv.title.trim())return;
    const memberUids=[me.uid,...friends.map(f=>f.uid)];
    await db.collection("events").add({title:nEv.title.trim(),date:nEv.date,time:nEv.time,location:nEv.location,description:nEv.description,creatorUid:me.uid,creatorName:me.displayName,memberUids,attendees:[{uid:me.uid,name:me.displayName}],invited:friends.map(f=>({uid:f.uid,name:f.displayName})),cover:COVERS[Math.floor(Math.random()*COVERS.length)],rsvps:{[me.uid]:"going"},createdAt:nowTs()});
    setNEv({title:"",date:"",time:"",location:"",description:""});setModal(null);setTab("events");
  };

  const deleteEvent=async(evId)=>{
    setActiveEv(prev=>prev?.id===evId?null:prev);
    await db.collection("events").doc(evId).delete();
  };

  const rsvpEvent=async(evId,rsvp)=>{
    await db.collection("events").doc(evId).update({["rsvps."+me.uid]:rsvp});
  };

  const sharePhoto=async()=>{
    if(pUploading)return;
    setPUploading(true);
    const cols=["#c9a96e","#9e7a8c","#7a8fa6","#6b8c6e","#a67c52","#8c8c7a"];
    await db.collection("photos").add({ownerUid:me.uid,ownerName:me.displayName,caption:pCap.trim()||"A moment.",likes:[],color:cols[Math.floor(Math.random()*cols.length)],imageData:pImg||null,createdAt:nowTs()});
    setPCap("");setPImg(null);setPUploading(false);setModal(null);
  };

  const toggleLike=async(photo)=>{
    const likes=photo.likes||[];const already=likes.includes(me.uid);
    await db.collection("photos").doc(photo.id).update({likes:already?firebase.firestore.FieldValue.arrayRemove(me.uid):firebase.firestore.FieldValue.arrayUnion(me.uid)});
  };

  const markNotifRead=async(nid)=>{
    await db.collection("users").doc(me.uid).collection("notifications").doc(nid).update({unread:false});
  };

  const signOut=async()=>{
    await db.collection("users").doc(me.uid).update({online:false}).catch(()=>{});
    await auth.signOut();
  };

  const unread=notifs.filter(n=>n.unread).length+requests.length;
  const pu=tab==="profile"&&viewUser?viewUser:{...me,username:me._username};
  const isMe=pu.uid===me.uid;

  const navs=[
    {id:"chat",n:"chat",label:"Messages",badge:false},
    {id:"friends",n:"users",label:"Friends",badge:requests.length>0},
    {id:"events",n:"calendar",label:"Events",badge:false},
    {id:"photos",n:"image",label:"Moments",badge:false},
    {id:"notifications",n:"bell",label:"Notifications",badge:unread>0},
  ];
  const tabLabel={chat:"Messages",friends:"Friends",events:"Events",photos:"Moments",notifications:"Notifications",profile:"Profile"};

  /* ── build guest list from rsvps ── */
  const buildGuests=(ev)=>{
    if(!ev)return{going:[],maybe:[],cantgo:[],invited:[]};
    const rsvps=ev.rsvps||{};
    const uids=ev.memberUids||[];
    const going=[],maybe=[],cantgo=[],invited=[];
    uids.forEach(uid=>{
      const name=uid===me.uid?(me.displayName||"You"):friends.find(f=>f.uid===uid)?.displayName||"Someone";
      const p={uid,name,isMe:uid===me.uid};
      if(rsvps[uid]==="going")going.push(p);
      else if(rsvps[uid]==="maybe")maybe.push(p);
      else if(rsvps[uid]==="can't go")cantgo.push(p);
      else invited.push(p);
    });
    return{going,maybe,cantgo,invited};
  };

  const GuestList=({ev})=>{
    const{going,maybe,cantgo,invited}=buildGuests(ev);
    const Sec=({label,people,col})=>people.length===0?null:(
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:col,letterSpacing:".07em",textTransform:"uppercase",marginBottom:6,fontWeight:600}}>{label} · {people.length}</div>
        {people.map(p=>(
          <div key={p.uid} style={{display:"flex",alignItems:"center",gap:9,padding:"5px 0",borderBottom:"1px solid #0e0e0e"}}>
            <Av user={{uid:p.uid,displayName:p.name}} size={28}/>
            <span style={{fontSize:13,color:p.isMe?"#c9a96e":"#ccc"}}>{p.isMe?"You":p.name}</span>
          </div>
        ))}
      </div>
    );
    return(
      <div>
        <div style={{fontSize:13,fontWeight:500,color:"#888",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #141414"}}>Who's coming</div>
        <Sec label="Going" people={going} col="#6db87a"/>
        <Sec label="Maybe" people={maybe} col="#d4a84b"/>
        <Sec label="Can't go" people={cantgo} col="#c97070"/>
        <Sec label="Invited" people={invited} col="#484848"/>
        {going.length+maybe.length+cantgo.length+invited.length===0&&<div style={{fontSize:12,color:"#333"}}>No responses yet.</div>}
      </div>
    );
  };

  return(
    <>
      
      <div className="app">

        {/* ══ DESKTOP SIDEBAR — shown via CSS media query ══ */}
        <div className="desktop-sidebar">
          <div className="ds-logo">
            <div className="ds-mark"><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#c9a96e",lineHeight:1}}>✦</span></div>
            <span className="ds-name">Cercle</span>
          </div>
          <div className="ds-nav">
            {navs.map(item=>(
              <button key={item.id} className={"ds-btn"+(tab===item.id?" on":"")} onClick={()=>{setActiveChat(null);setActiveEv(null);setViewUser(null);setTab(item.id);}}>
                <I n={item.n} s={17}/>{item.label}
                {item.badge&&<div className="bdg"/>}
              </button>
            ))}
          </div>
          <div className="ds-divider"/>
          <div className="ds-profile" onClick={()=>{setViewUser(null);setTab("profile");}}>
            <Av user={me} size={34} dot/>
            <div><div className="ds-profile-name">{me.displayName}</div><div className="ds-profile-un">@{me._username}</div></div>
          </div>
        </div>

        {/* TOP BAR — mobile only */}
        <div className="topbar">
          <div className="topbar-logo" onClick={()=>{setViewUser(null);setTab("profile");}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#c9a96e",lineHeight:1}}>✦</span>
          </div>
          <span className="topbar-title">{tabLabel[tab]||"Cercle"}</span>
          {tab==="friends"&&<button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>{setSearchQ("");setSearchRes(null);setSearchErr("");setSearchMsg("");setModal("add-friend");}}>+ Add</button>}
          {tab==="events"&&<button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>setModal("new-event")}>+ Create</button>}
          {tab==="photos"&&<button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>{setPImg(null);setPCap("");setModal("photo");}}>+ Share</button>}
          {tab==="notifications"&&unread>0&&<button className="btn ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>notifs.filter(n=>n.unread).forEach(n=>markNotifRead(n.id))}>All read</button>}
          {tab==="profile"&&isMe&&<button className="btn ghost" style={{fontSize:12,padding:"5px 10px",display:"flex",alignItems:"center",gap:4}} onClick={signOut}><I n="logout" s={13}/>Out</button>}
        </div>

        {/* CONTENT */}
        <div className="content">

          {/* ── CHAT ── */}
          {tab==="chat"&&(
            <div className="screen">
              {/* panel: friend list */}
              <div className="desk-panel">
                <div className="desk-panel-hdr"><span className="desk-panel-title">Messages</span></div>
                <div className="desk-panel-body">
                  {friends.length===0?(
                    <div className="empty"><I n="chat" s={30} c="#1e1e1e"/><p>Add friends to start chatting.</p><button className="btn gold" style={{marginTop:6}} onClick={()=>setTab("friends")}>Find friends</button></div>
                  ):friends.map(u=>(
                    <div key={u.uid} className="li" style={{borderLeft:activeChat?.id===u.uid?"2px solid #c9a96e":"2px solid transparent"}} onClick={()=>setActiveChat({type:"dm",id:u.uid})}>
                      <Av user={u} size={44} dot/>
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{fontSize:13,fontWeight:500,color:"#ddd8cc"}}>{u.displayName}</div>
                        <div style={{fontSize:12,color:"#484848",marginTop:1}}>@{u.username} · {u.online?"online":"offline"}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {/* desktop: chat area always visible beside panel */}
              <div className="desk-main">
                {(()=>{
                  const peer=activeChat?.type==="dm"?friends.find(f=>f.uid===activeChat.id):null;
                  return peer?(
                    <>
                      <div style={{padding:"13px 18px",borderBottom:"1px solid #141414",background:"#0a0a0a",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                        <Av user={peer} size={34} dot/>
                        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:"#eee8dd"}}>{peer.displayName}</div><div style={{fontSize:11,color:"#3a3a3a"}}>{peer.online?"online":"offline"}</div></div>
                        <button className="btn ghost" style={{fontSize:12,padding:"4px 11px"}} onClick={()=>setSharingLoc(s=>!s)}><I n="location" s={12}/> {sharingLoc?"Stop":"Share loc"}</button>
                      </div>
                      {sharingLoc&&<div className="lbar"><div className="pulse" style={{width:7,height:7,borderRadius:"50%",background:"#6db87a"}}/><span style={{fontSize:12,color:"#6db87a"}}>Sharing live location</span><button onClick={()=>setSharingLoc(false)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#484848"}}>Stop</button></div>}
                      <div className="ca">
                        {messages.length===0&&<div className="empty"><I n="chat" s={30} c="#1e1e1e"/><p>No messages yet.</p></div>}
                        {messages.map(m=>(
                          <div key={m.id} className={"msg"+(m.from===me.uid?" me":"")+" fade"}>
                            {m.from!==me.uid&&<Av user={peer} size={28}/>}
                            <div><div className="bbl">{m.text}</div><div className="mt">{m.createdAt?fmtTime(m.createdAt):""}</div></div>
                          </div>
                        ))}
                        <div ref={endRef}/>
                      </div>
                      <div className="ia"><div className="ir"><textarea className="ci" placeholder="Message…" rows={1} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}/><button className="sb" onClick={sendMessage}><I n="send" s={13} c="#0a0a0a"/></button></div></div>
                    </>
                  ):(
                    <div className="empty"><I n="chat" s={40} c="#181818"/><p>{friends.length===0?"Add friends to start chatting.":"Select a conversation."}</p></div>
                  );
                })()}
              </div>
              {/* mobile slide */}
              {(()=>{
                const peer=activeChat?.type==="dm"?friends.find(f=>f.uid===activeChat.id):null;
                const open=!!(activeChat&&peer);
                return(
                  <div className={"slide"+(open?" open":"")}>
                    <div className="sh"><button className="sh-back" onClick={()=>setActiveChat(null)}><I n="back" s={20}/></button>{peer&&<Av user={peer} size={32} dot/>}<div style={{flex:1}}><div className="sh-title">{peer?.displayName||""}</div><div style={{fontSize:11,color:"#3a3a3a"}}>{peer?.online?"online":"offline"}</div></div><button className="sh-action" onClick={()=>setSharingLoc(s=>!s)} style={{color:sharingLoc?"#6db87a":"#555"}}>{sharingLoc?"Stop":"Share loc"}</button></div>
                    {sharingLoc&&<div className="lbar"><div className="pulse" style={{width:7,height:7,borderRadius:"50%",background:"#6db87a"}}/><span style={{fontSize:12,color:"#6db87a"}}>Sharing live location</span><button onClick={()=>setSharingLoc(false)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#484848"}}>Stop</button></div>}
                    <div className="ca">
                      {messages.length===0&&<div className="empty"><I n="chat" s={30} c="#1e1e1e"/><p>No messages yet.</p></div>}
                      {messages.map(m=>(
                        <div key={m.id} className={"msg"+(m.from===me.uid?" me":"")+" fade"}>
                          {m.from!==me.uid&&peer&&<Av user={peer} size={28}/>}
                          <div><div className="bbl">{m.text}</div><div className="mt">{m.createdAt?fmtTime(m.createdAt):""}</div></div>
                        </div>
                      ))}
                      <div ref={endRef}/>
                    </div>
                    <div className="ia"><div className="ir"><textarea className="ci" placeholder="Message…" rows={1} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}/><button className="sb" onClick={sendMessage}><I n="send" s={13} c="#0a0a0a"/></button></div></div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ── FRIENDS ── */}
          {tab==="friends"&&(
            <div className="screen">
              <div className="desk-panel">
                <div className="desk-panel-hdr">
                  <span className="desk-panel-title">Friends</span>
                  <button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>{setSearchQ("");setSearchRes(null);setSearchErr("");setSearchMsg("");setModal("add-friend");}}>+ Add</button>
                </div>
                <div className="desk-panel-body">
                  {requests.map(req=>(
                    <div key={req.uid} className="fr-req">
                      <Av user={req} size={40}/>
                      <div style={{flex:1}}><div style={{fontSize:13,color:"#ddd",fontWeight:500}}>{req.fromName}</div><div style={{fontSize:11,color:"#c9a96e"}}>friend request</div></div>
                      <div style={{display:"flex",gap:6}}><button className="btn gold" style={{padding:"4px 10px",fontSize:12}} onClick={()=>acceptRequest(req)}>Accept</button><button className="btn ghost" style={{padding:"4px 8px",fontSize:12}} onClick={()=>declineRequest(req)}>✕</button></div>
                    </div>
                  ))}
                  {friends.length===0&&requests.length===0?(
                    <div className="empty"><I n="users" s={30} c="#1e1e1e"/><p>No friends yet.</p><button className="btn gold" style={{marginTop:6}} onClick={()=>setModal("add-friend")}>Add friend</button></div>
                  ):friends.map(u=>(
                    <div key={u.uid} className="li" style={{borderLeft:viewUser?.uid===u.uid?"2px solid #c9a96e":"2px solid transparent"}} onClick={()=>{setViewUser(u);setTab("profile");}}>
                      <Av user={u} size={44} dot/>
                      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:"#ddd8cc"}}>{u.displayName}</div><div style={{fontSize:12,color:"#484848",marginTop:1}}>@{u.username}{u.location?" · "+u.location:""}</div></div>
                      <button className="btn ghost" style={{fontSize:11,padding:"4px 9px"}} onClick={e=>{e.stopPropagation();setActiveChat({type:"dm",id:u.uid});setTab("chat");}}>Chat</button>
                    </div>
                  ))}
                </div>
              </div>
              <div className="desk-main"><div className="empty"><I n="users" s={40} c="#181818"/><p>{friends.length===0?"Add friends by username to get started.":"Select a friend."}</p></div></div>
            </div>
          )}

          {/* ── EVENTS ── */}
          {tab==="events"&&(
            <div className="screen">
              {/* event list panel */}
              <div className="desk-panel">
                <div className="desk-panel-hdr">
                  <span className="desk-panel-title">Events</span>
                  <button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>setModal("new-event")}>+ Create</button>
                </div>
                <div className="desk-panel-body" style={{padding:"10px 12px"}}>
                  {events.length===0&&<div className="empty"><I n="calendar" s={30} c="#1e1e1e"/><p>No events yet.</p></div>}
                  {events.map(ev=>{
                    const myRsvp=ev.rsvps?.[me.uid]||"invited";
                    return(
                      <div key={ev.id} className="evc" style={{borderColor:activeEv?.id===ev.id?"#c9a96e55":"#181818"}} onClick={()=>setActiveEv(ev)}>
                        <div className={"ecv "+ev.cover}/>
                        <div className="ecb">
                          <div style={{fontSize:13,fontWeight:500,color:"#eee8dd",marginBottom:2}}>{ev.title}</div>
                          <div style={{fontSize:12,color:"#555"}}>{ev.date||"Date TBD"}{ev.time?" · "+ev.time:""}</div>
                          {ev.location&&<div style={{fontSize:11,color:"#484848",display:"flex",gap:3,marginTop:2,alignItems:"center"}}><I n="pin" s={10}/>{ev.location}</div>}
                          <div style={{marginTop:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span className={"tag t"+myRsvp[0]}>{myRsvp}</span>
                            {ev.creatorUid===me.uid&&<button onClick={e=>{e.stopPropagation();deleteEvent(ev.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#555",padding:"2px 6px",fontSize:13}}>✕</button>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* desktop: event detail */}
              <div className="desk-main">
                {activeEv?(
                  <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
                    <div className={"ecv "+activeEv.cover} style={{height:160,position:"relative"}}>
                      <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,#090909)"}}/>
                      <div style={{position:"absolute",bottom:16,left:22,right:22,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:300,color:"#f5f0e8"}}>{activeEv.title}</h1>
                        {activeEv.creatorUid===me.uid&&<button onClick={()=>deleteEvent(activeEv.id)} style={{background:"#1a0808",border:"1px solid #3a1414",borderRadius:8,color:"#c97070",fontSize:12,padding:"5px 12px",cursor:"pointer"}}>Delete</button>}
                      </div>
                    </div>
                    <div style={{padding:"20px 24px",display:"grid",gridTemplateColumns:"1fr 280px",gap:28,alignItems:"start"}}>
                      <div>
                        <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
                          {["going","maybe","can't go"].map(r=>(
                            <button key={r} className={"btn"+((activeEv.rsvps?.[me.uid]||"invited")===r?" gold":" ghost")} style={{padding:"6px 16px",fontSize:13}} onClick={()=>rsvpEvent(activeEv.id,r)}>{r.charAt(0).toUpperCase()+r.slice(1)}</button>
                          ))}
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
                          {[["Date",activeEv.date||"TBD"],["Time",activeEv.time||"TBD"],["Location",activeEv.location||"TBD"],["Host",activeEv.creatorName]].map(([l,v])=>(
                            <div key={l} style={{background:"#0c0c0c",border:"1px solid #181818",borderRadius:9,padding:"10px 12px"}}>
                              <div style={{fontSize:10,color:"#484848",letterSpacing:".06em",textTransform:"uppercase",marginBottom:2}}>{l}</div>
                              <div style={{fontSize:13,color:"#ccc"}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {activeEv.description&&<p style={{fontSize:13,color:"#888",lineHeight:1.7}}>{activeEv.description}</p>}
                      </div>
                      <div style={{borderLeft:"1px solid #141414",paddingLeft:24}}>
                        <GuestList ev={activeEv}/>
                      </div>
                    </div>
                  </div>
                ):(
                  <div className="empty"><I n="calendar" s={40} c="#181818"/><p>{events.length===0?"Create your first event.":"Select an event."}</p>{events.length===0&&<button className="btn gold" style={{marginTop:8}} onClick={()=>setModal("new-event")}>+ Create event</button>}</div>
                )}
              </div>

              {/* mobile slide */}
              <div className={"slide"+(activeEv?" open":"")}>
                {activeEv&&(
                  <>
                    <div className="sh">
                      <button className="sh-back" onClick={()=>setActiveEv(null)}><I n="back" s={20}/></button>
                      <span className="sh-title">{activeEv.title}</span>
                      {activeEv.creatorUid===me.uid&&<button className="sh-action" style={{color:"#c97070"}} onClick={()=>deleteEvent(activeEv.id)}>Delete</button>}
                    </div>
                    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
                      <div className={"ecv "+activeEv.cover} style={{height:120,position:"relative"}}>
                        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,#090909)"}}/>
                      </div>
                      <div style={{padding:"16px 18px"}}>
                        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                          {["going","maybe","can't go"].map(r=>(
                            <button key={r} className={"btn"+((activeEv.rsvps?.[me.uid]||"invited")===r?" gold":" ghost")} style={{padding:"6px 13px",fontSize:13}} onClick={()=>rsvpEvent(activeEv.id,r)}>{r.charAt(0).toUpperCase()+r.slice(1)}</button>
                          ))}
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
                          {[["Date",activeEv.date||"TBD"],["Time",activeEv.time||"TBD"],["Location",activeEv.location||"TBD"],["Host",activeEv.creatorName]].map(([l,v])=>(
                            <div key={l} style={{background:"#0c0c0c",border:"1px solid #181818",borderRadius:9,padding:"10px 12px"}}>
                              <div style={{fontSize:10,color:"#484848",letterSpacing:".06em",textTransform:"uppercase",marginBottom:2}}>{l}</div>
                              <div style={{fontSize:13,color:"#ccc"}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {activeEv.description&&<p style={{fontSize:13,color:"#888",lineHeight:1.7,marginBottom:16}}>{activeEv.description}</p>}
                        <GuestList ev={activeEv}/>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {/* ── PHOTOS ── */}
          {tab==="photos"&&(
            <div className="screen">
              <div className="desk-panel">
                <div className="desk-panel-hdr">
                  <span className="desk-panel-title">Moments</span>
                  <button className="btn gold" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>{setPImg(null);setPCap("");setModal("photo");}}>+ Share</button>
                </div>
                <div className="desk-panel-body">
                  {photos.length===0?(
                    <div className="empty"><I n="image" s={30} c="#1e1e1e"/><p>No photos yet.</p></div>
                  ):(
                    <div className="pgrid">
                      {photos.map(ph=>{
                        const isLiked=(ph.likes||[]).includes(me.uid);
                        return(
                          <div key={ph.id} className="pc">
                            {ph.imageData?<img src={ph.imageData} alt={ph.caption}/>:<div className="pc-color" style={{background:"linear-gradient(135deg,"+ph.color+"88,"+ph.color+"22)"}}><I n="image" s={28} c={ph.color+"66"}/></div>}
                            <div className="pov">
                              <div style={{fontSize:11,color:"#e0dbd0",marginBottom:3,lineHeight:1.3}}>{ph.caption}</div>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                                <div style={{fontSize:11,color:"#888"}}>{ph.ownerName}</div>
                                <button onClick={e=>{e.stopPropagation();toggleLike(ph);}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3,color:isLiked?"#c9703a":"#aaa",fontSize:12}}><I n={isLiked?"heartF":"heart"} s={12} c={isLiked?"#c9703a":"#aaa"}/>{(ph.likes||[]).length}</button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
              <div className="desk-main"><div className="empty"><I n="image" s={40} c="#181818"/><p>Your circle's moments.</p><button className="btn gold" style={{marginTop:8}} onClick={()=>{setPImg(null);setPCap("");setModal("photo");}}>+ Share a photo</button></div></div>
            </div>
          )}

          {/* ── NOTIFICATIONS ── */}
          {tab==="notifications"&&(
            <div className="screen">
              <div className="desk-panel" style={{width:"100%",maxWidth:"640px",borderRight:"none"}}>
                <div className="desk-panel-hdr">
                  <span className="desk-panel-title">Notifications</span>
                  {unread>0&&<button className="btn ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>notifs.filter(n=>n.unread).forEach(n=>markNotifRead(n.id))}>Mark all read</button>}
                </div>
                <div className="desk-panel-body">
                  {notifs.length===0?<div className="empty"><I n="bell" s={36} c="#1e1e1e"/><p>Nothing here yet.</p></div>
                    :notifs.map(n=>(
                      <div key={n.id} className={"nrow"+(n.unread?" ur":"")} onClick={()=>markNotifRead(n.id)}>
                        <Av user={{uid:n.from,displayName:n.fromName||"?"}} size={40}/>
                        <div style={{flex:1}}><div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{n.text}</div><div style={{fontSize:11,color:"#383838",marginTop:2}}>{n.createdAt?fmtTime(n.createdAt):""}</div></div>
                        {n.unread&&<div className="ndot"/>}
                      </div>
                    ))}
                </div>
              </div>
            </div>
          )}

          {/* ── PROFILE ── */}
          {tab==="profile"&&(
            <div className="screen">
              <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"32px 28px",maxWidth:560}}>
                <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:28}}>
                  <Av user={pu} size={76} dot/>
                  <div style={{flex:1}}>
                    <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:300,color:"#f0ebe0"}}>{pu.displayName||pu.name}</h1>
                    <div style={{fontSize:13,color:"#555",marginBottom:5}}>@{pu.username}</div>
                    {pu.bio&&<p style={{fontSize:13,color:"#888",lineHeight:1.6,marginBottom:5}}>{pu.bio}</p>}
                    {pu.location&&<div style={{fontSize:12,color:"#484848",display:"flex",gap:4,alignItems:"center"}}><I n="pin" s={12}/>{pu.location}</div>}
                    {!isMe&&<div style={{display:"flex",gap:8,marginTop:14}}>
                      <button className="btn gold" onClick={()=>{setActiveChat({type:"dm",id:pu.uid});setTab("chat");}}>Message</button>
                      {friends.find(f=>f.uid===pu.uid)?<button className="btn ghost">Friends ✓</button>:<button className="btn gold" onClick={()=>sendFriendRequest(pu)}>+ Add</button>}
                    </div>}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:28}}>
                  {[["Friends",friends.length],["Events",events.filter(e=>e.memberUids?.includes(pu.uid)).length],["Moments",photos.filter(p=>p.ownerUid===pu.uid).length]].map(([l,v])=>(
                    <div key={l} className="st"><div style={{fontSize:24,fontFamily:"'Cormorant Garamond',serif",color:"#c9a96e"}}>{v}</div><div style={{fontSize:11,color:"#484848",marginTop:2}}>{l}</div></div>
                  ))}
                </div>
                {isMe&&<button className="btn ghost" style={{fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"11px 18px"}} onClick={signOut}><I n="logout" s={14}/>Sign out</button>}
                {!isMe&&<button className="btn ghost" style={{fontSize:13,padding:"11px 18px",marginTop:4}} onClick={()=>setTab("friends")}>← Back</button>}
              </div>
            </div>
          )}

        </div>{/* end content */}

        {/* BOTTOM NAV — mobile only */}
        <div className="bottomnav">
          {navs.map(item=>(
            <button key={item.id} className={"bnb"+(tab===item.id?" on":"")} onClick={()=>{setActiveChat(null);setActiveEv(null);setTab(item.id);}}>
              <I n={item.n} s={22}/>
              <span>{item.label==="Notifications"?"Alerts":item.label==="Messages"?"Chats":item.label}</span>
              {item.badge&&<div className="bdg"/>}
            </button>
          ))}
          <button className={"bnb"+(tab==="profile"?" on":"")} onClick={()=>{setViewUser(null);setTab("profile");}}>
            <I n="user" s={22}/>
            <span>Profile</span>
          </button>
        </div>

        {/* ══ MODALS ══ */}
        {modal&&(
          <div className="ov" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div className="sheet fade">
              <div className="sheet-handle"/>

              {modal==="add-friend"&&(
                <>
                  <div className="mhdr">
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#f0ebe0"}}>Add a Friend</span>
                    <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
                  </div>
                  <div className="mbody">
                    <p style={{fontSize:13,color:"#555",marginBottom:14,lineHeight:1.6}}>Search by username to find people on Cercle.</p>
                    <div className="field">
                      <label>Username</label>
                      <div style={{display:"flex",gap:8}}>
                        <div style={{position:"relative",flex:1}}>
                          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#444",fontSize:15}}>@</span>
                          <input style={{paddingLeft:26}} placeholder="username" value={searchQ} autoCapitalize="none" autoCorrect="off"
                            onChange={e=>{setSearchQ(e.target.value.replace(/\s/g,"").toLowerCase());setSearchRes(null);setSearchErr("");setSearchMsg("");}}
                            onKeyDown={e=>e.key==="Enter"&&searchUser()} autoFocus/>
                        </div>
                        <button className="btn gold" onClick={searchUser}>Search</button>
                      </div>
                    </div>
                    {searchErr&&<div className="warn">{searchErr}</div>}
                    {searchMsg&&<div className="ok-msg">{searchMsg}</div>}
                    {searchRes&&(
                      <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px",background:"#0e0e0e",borderRadius:12,border:"1px solid #1e1e1e"}}>
                        <Av user={searchRes} size={46}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,color:"#ddd8cc",fontWeight:500}}>{searchRes.displayName}</div>
                          <div style={{fontSize:12,color:"#555"}}>@{searchRes.username}{searchRes.location?" · "+searchRes.location:""}</div>
                          {searchRes.bio&&<div style={{fontSize:12,color:"#484848",marginTop:2}}>{searchRes.bio}</div>}
                        </div>
                        <button className="btn gold" onClick={()=>sendFriendRequest(searchRes)}>+ Add</button>
                      </div>
                    )}
                  </div>
                </>
              )}

              {modal==="new-event"&&(
                <>
                  <div className="mhdr">
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#f0ebe0"}}>Create Event</span>
                    <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
                  </div>
                  <div className="mbody">
                    <div className="field"><label>Name *</label><input placeholder="e.g. Rooftop Aperitivo" value={nEv.title} onChange={e=>setNEv(n=>({...n,title:e.target.value}))} autoFocus/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                      <div className="field"><label>Date</label><input type="date" value={nEv.date} onChange={e=>setNEv(n=>({...n,date:e.target.value}))}/></div>
                      <div className="field"><label>Time</label><input type="time" value={nEv.time} onChange={e=>setNEv(n=>({...n,time:e.target.value}))}/></div>
                    </div>
                    <div className="field">
                      <label>Location</label>
                      <div style={{position:"relative"}}>
                        <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><I n="pin" s={13} c="#c9a96e"/></div>
                        <input style={{paddingLeft:30}} placeholder="Address or place" value={nEv.location} onChange={e=>setNEv(n=>({...n,location:e.target.value}))}/>
                      </div>
                    </div>
                    <div className="field"><label>Description</label><textarea placeholder="What's the plan?" value={nEv.description} onChange={e=>setNEv(n=>({...n,description:e.target.value}))}/></div>
                    {friends.length===0&&<div className="warn">Add friends first so they get invited.</div>}
                    <button className="btn gold" style={{width:"100%",padding:13,fontSize:15}} onClick={createEvent} disabled={!nEv.title.trim()}>Create Event</button>
                  </div>
                </>
              )}

              {modal==="photo"&&(
                <>
                  <div className="mhdr">
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#f0ebe0"}}>Share a Moment</span>
                    <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
                  </div>
                  <div className="mbody">
                    <div className={"upload-area"+(pImg?" has-img":"")}>
                      {pImg
                        ?<img src={pImg} alt="preview" style={{width:"100%",maxHeight:260,objectFit:"contain"}}/>
                        :<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"32px 20px"}}>
                          <I n="camera" s={36} c="#2a2a2a"/>
                          <p style={{color:"#484848",fontSize:14,textAlign:"center"}}>Tap to select a photo</p>
                          <p style={{color:"#2a2a2a",fontSize:12}}>Camera roll or files</p>
                        </div>
                      }
                      <input type="file" accept="image/*" onChange={async e=>{
                        const file=e.target.files?.[0]; if(!file)return;
                        const data=await readFileAsBase64(file); setPImg(data);
                      }}/>
                    </div>
                    <div className="field"><label>Caption</label><input placeholder="Write something…" value={pCap} onChange={e=>setPCap(e.target.value)}/></div>
                    <button className="btn gold" style={{width:"100%",padding:13,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={sharePhoto} disabled={pUploading}>
                      {pUploading?<svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>:"Share"}
                    </button>
                  </div>
                </>
              )}

            </div>
          </div>
        )}

      </div>
    </>
  );
}

/* ════════════════════════════════════════
   ROOT
════════════════════════════════════════ */
function Root(){
  const [user,setUser]=useState(undefined);
  const [profile,setProfile]=useState(null);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const doc=await db.collection("users").doc(fbUser.uid).get();
        if(doc.exists){setProfile({...doc.data(),_username:doc.data().username});}
        else{setProfile({uid:fbUser.uid,displayName:fbUser.displayName||"User",_username:""});}
        setUser(fbUser);
      }else{setUser(null);setProfile(null);}
    });return unsub;
  },[]);

  if(user===undefined) return(
    <>
      
      <div style={{height:"100dvh",background:"#060606",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,color:"#c9a96e"}}>✦</div>
        <Spinner/>
      </div>
    </>
  );

  if(!user) return <><AuthScreen/></>;
  return <MainApp me={profile}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
