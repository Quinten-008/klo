function cid(id){ let h=0; for(let i=0;i<(id||"x").length;i++) h=(id||"x").charCodeAt(i)+((h<<5)-h); return PAL[Math.abs(h)%PAL.length]; }
function ini(n){ return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function nowTs(){ return firebase.firestore.FieldValue.serverTimestamp(); }
function fmtTime(ts){ if(!ts) return ""; const d=ts.toDate?ts.toDate():new Date(ts); const h=d.getHours(),m=d.getMinutes(); return`${h}:${m<10?"0"+m:m}`; }
function chatId(a,b){ return [a,b].sort().join("_"); }

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function Av({user,size=40,dot=false}){
  const c = cid(user?.uid||user?.username||"x");

    <div style={{position:"relative",display:"inline-block",flexShrink:0}}>

}

function AuthScreen({ onAuth }) {
  const [mode, setMode]       = useState("login"); // login | register | forgot
  const [email, setEmail]     = useState("");
  const [pass, setPass]       = useState("");
  const [name, setName]       = useState("");
  const [username, setUN]     = useState("");
  const [bio, setBio]         = useState("");
  const [location, setLoc]    = useState("");
  const [showPw, setShowPw]   = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState("");
  const [ok, setOk]           = useState("");

  const submit = async () => {
    setErr(""); setOk("");
    if (!email.trim()) { setErr("Email is required."); return; }

    if (mode === "forgot") {
      setLoading(true);
      try {
        await auth.sendPasswordResetEmail(email.trim());
        setOk("Reset email sent — check your inbox.");
      } catch(e) { setErr(e.message); }
      setLoading(false); return;
    }

    if (!pass) { setErr("Password is required."); return; }

    setLoading(true);
    try {
      if (mode === "register") {
        if (!name.trim())        { setErr("Please enter your name."); setLoading(false); return; }
        if (!username.trim())    { setErr("Please choose a username."); setLoading(false); return; }
        if (/\s/.test(username)) { setErr("No spaces in username."); setLoading(false); return; }
        if (pass.length < 6)     { setErr("Password must be at least 6 characters."); setLoading(false); return; }

        const un = username.trim().toLowerCase();

        // 1. Create the Firebase Auth account first (gives us an authenticated session)
        let cred;
        try {
          cred = await auth.createUserWithEmailAndPassword(email.trim(), pass);
        } catch(authErr) {
          const msgs = {
            "auth/email-already-in-use": "Email already registered.",
            "auth/weak-password": "Password must be at least 6 characters.",
            "auth/invalid-email": "Invalid email address.",
          };
          setErr(msgs[authErr.code] || authErr.message);
          setLoading(false); return;
        }

        // 2. Now we're authenticated — safe to read/write Firestore
        try {
          // Check username uniqueness
          const snap = await db.collection("users").where("username","==",un).limit(1).get();
          if (!snap.empty) {
            // Username taken — delete the auth account we just made and bail
            await cred.user.delete();
            setErr("Username already taken. Please choose another.");
            setLoading(false); return;
          }

          await cred.user.updateProfile({ displayName: name.trim() });
          await db.collection("users").doc(cred.user.uid).set({
            uid: cred.user.uid,
            displayName: name.trim(),
            username: un,
            bio: bio.trim(),
            location: location.trim(),
            email: email.trim(),
            online: true,
            createdAt: nowTs(),
          });
        } catch(dbErr) {
          // If Firestore write fails, clean up the auth account
          try { await cred.user.delete(); } catch(_) {}
          setErr("Could not save profile: " + dbErr.message);
          setLoading(false); return;
        }

      } else {
        await auth.signInWithEmailAndPassword(email.trim(), pass);
        const u = auth.currentUser;
        if (u) {
          try { await db.collection("users").doc(u.uid).update({ online: true }); } catch(_) {}
        }
      }
    } catch(e) {
      const msgs = {
        "auth/email-already-in-use": "Email already registered.",
        "auth/wrong-password": "Incorrect password.",
        "auth/user-not-found": "No account found with that email.",
        "auth/weak-password": "Password must be at least 6 characters.",
        "auth/invalid-email": "Invalid email address.",
        "auth/invalid-credential": "Incorrect email or password.",
      };
      setErr(msgs[e.code] || e.message);
    }
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-bg"/><div className="auth-glow"/>
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-mark"><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#c9a96e",lineHeight:1}}>✦</span></div>
          <span className="auth-wm">Cercle</span>
        </div>

        {mode==="login" && <>
          <h1 className="auth-h">Welcome<br/><em>back.</em></h1>
          <p className="auth-sub">Sign in to your circle.</p>
        </>}
        {mode==="register" && <>
          <h1 className="auth-h">Join<br/><em>Cercle.</em></h1>
          <p className="auth-sub">Create your private circle.</p>
        </>}
        {mode==="forgot" && <>
          <h1 className="auth-h">Reset your<br/><em>password.</em></h1>
          <p className="auth-sub">We'll send a link to your email.</p>
        </>}

        {err && <div className="auth-err">{err}</div>}
        {ok  && <div className="auth-ok">{ok}</div>}

        {mode==="register" && <>
          <div className="auth-f"><label>Full name</label><input className="auth-in" placeholder="Sofia Laurent" value={name} onChange={e=>setName(e.target.value)} autoFocus/></div>
          <div className="auth-f"><label>Username</label>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#484848",fontSize:15}}>@</span>
              <input className="auth-in" style={{paddingLeft:26}} placeholder="yourname" value={username} onChange={e=>setUN(e.target.value.replace(/\s/g,"").toLowerCase())}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="auth-f"><label>Location <span style={{color:"#2a2a2a",fontSize:10}}>optional</span></label><input className="auth-in" placeholder="Paris, FR" value={location} onChange={e=>setLoc(e.target.value)}/></div>
            <div className="auth-f"><label>Bio <span style={{color:"#2a2a2a",fontSize:10}}>optional</span></label><input className="auth-in" placeholder="A line about you" value={bio} onChange={e=>setBio(e.target.value)}/></div>
          </div>
          <div className="auth-divider"><span>account details</span></div>
        </>}

        <div className="auth-f"><label>Email</label><input className="auth-in" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus={mode!=="register"}/></div>

        {mode!=="forgot" && (
          <div className="auth-f"><label>Password</label>
            <div className="auth-pw">
              <input className="auth-in" type={showPw?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
              <button className="auth-pw-toggle" onClick={()=>setShowPw(p=>!p)}><I n={showPw?"eyeOff":"eye"} s={16}/></button>
            </div>
          </div>
        )}

        <button className="auth-btn" onClick={submit} disabled={loading}>
          {loading
            ? <svg className="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
            : mode==="login" ? "Sign in" : mode==="register" ? "Create account" : "Send reset link"
          }
        </button>

        {mode==="login" && (
          <div className="auth-switch" style={{marginTop:12}}>
            <button onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Forgot password?</button>
          </div>
        )}
        <div className="auth-switch">
          {mode==="login"
            ? <><span>No account? </span><button onClick={()=>{setMode("register");setErr("");setOk("");}}>Create one</button></>
            : mode==="register"
            ? <><span>Already have one? </span><button onClick={()=>{setMode("login");setErr("");setOk("");}}>Sign in</button></>
            : <button onClick={()=>{setMode("login");setErr("");setOk("");}}>Back to sign in</button>
          }
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   MAIN APP
───────────────────────────────────────────── */
function MainApp({ me }) {
  const [tab, setTab]             = useState("chat");
  const [friends, setFriends]     = useState([]);
  const [requests, setRequests]   = useState([]); // incoming friend requests
  const [activeChat, setActiveChat] = useState(null); // {type:"dm"|"group", id}
  const [messages, setMessages]   = useState([]);
  const [events, setEvents]       = useState([]);
  const [activeEv, setActiveEv]   = useState(null);
  const [photos, setPhotos]       = useState([]);
  const [notifs, setNotifs]       = useState([]);
  const [viewUser, setViewUser]   = useState(null);
  const [modal, setModal]         = useState(null);
  const [txt, setTxt]             = useState("");
  const [sharingLoc, setSharingLoc] = useState(false);
  const [fSearch, setFSearch]     = useState("");
  const [searchQ, setSearchQ]     = useState("");
  const [searchRes, setSearchRes] = useState(null); // found user
  const [searchErr, setSearchErr] = useState("");
  const [searchMsg, setSearchMsg] = useState("");
  const [nEv, setNEv]             = useState({title:"",date:"",time:"",location:"",description:""});
  const [pCap, setPCap]           = useState("");
  const endRef = useRef(null);

  // ── Live listeners ──────────────────────────────────────

  // Presence: mark online
  useEffect(() => {
    db.collection("users").doc(me.uid).update({ online: true });
    return () => { db.collection("users").doc(me.uid).update({ online: false }); };
  }, [me.uid]);

  // Friends list
  useEffect(() => {
    const unsub = db.collection("users").doc(me.uid)
      .collection("friends")
      .onSnapshot(async snap => {
        const uids = snap.docs.map(d => d.id);
        if (!uids.length) { setFriends([]); return; }
        // fetch profiles
        const chunks = [];
        for (let i=0; i<uids.length; i+=10) chunks.push(uids.slice(i,i+10));
        const all = [];
        for (const chunk of chunks) {
          const s = await db.collection("users").where("uid","in",chunk).get();
          s.docs.forEach(d => all.push(d.data()));
        }
        setFriends(all);
      });
    return unsub;
  }, [me.uid]);

  // Incoming friend requests
  useEffect(() => {
    const unsub = db.collection("users").doc(me.uid)
      .collection("friendRequests")
      .where("status","==","pending")
      .onSnapshot(async snap => {
        const reqs = await Promise.all(snap.docs.map(async d => {
          const profile = await db.collection("users").doc(d.id).get();
          return { ...d.data(), uid: d.id, ...profile.data() };
        }));
        setRequests(reqs);
      });
    return unsub;
  }, [me.uid]);

  // Messages for active chat
  useEffect(() => {
    if (!activeChat) { setMessages([]); return; }
    const cid_ = activeChat.type==="dm" ? chatId(me.uid, activeChat.id) : activeChat.id;
    const unsub = db.collection("chats").doc(cid_)
      .collection("messages")
      .orderBy("createdAt","asc")
      .onSnapshot(snap => {
        setMessages(snap.docs.map(d => ({id:d.id,...d.data()})));
      });
    return unsub;
  }, [activeChat, me.uid]);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

  // Events (events created by me or where I'm invited)
  useEffect(() => {
    const unsub = db.collection("events")
      .where("memberUids","array-contains", me.uid)
      .orderBy("createdAt","desc")
      .onSnapshot(snap => {
        setEvents(snap.docs.map(d => ({id:d.id,...d.data()})));
      });
    return unsub;
  }, [me.uid]);

  // Photos (from friends + me)
  useEffect(() => {
    if (!friends.length) {
      // just my own photos
      const unsub = db.collection("photos")
        .where("ownerUid","==",me.uid)
        .orderBy("createdAt","desc")
        .onSnapshot(snap => setPhotos(snap.docs.map(d=>({id:d.id,...d.data()}))));
      return unsub;
    }
    const uids = [me.uid, ...friends.map(f=>f.uid)];
    const unsub = db.collection("photos")
      .where("ownerUid","in", uids.slice(0,10))
      .orderBy("createdAt","desc")
      .onSnapshot(snap => setPhotos(snap.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [me.uid, friends.length]);

  // Notifications
  useEffect(() => {
    const unsub = db.collection("users").doc(me.uid)
      .collection("notifications")
      .orderBy("createdAt","desc")
      .limit(30)
      .onSnapshot(snap => setNotifs(snap.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [me.uid]);

  // ── Actions ─────────────────────────────────────────────

  const sendMessage = async () => {
    if (!txt.trim() || !activeChat) return;
    const cid_ = activeChat.type==="dm" ? chatId(me.uid, activeChat.id) : activeChat.id;
    const text = txt.trim();
    setTxt("");
    await db.collection("chats").doc(cid_).collection("messages").add({
      from: me.uid,
      fromName: me.displayName,
      text,
      createdAt: nowTs(),
    });
    // update last message on chat doc
    await db.collection("chats").doc(cid_).set({
      lastMessage: text,
      lastAt: nowTs(),
      members: activeChat.type==="dm" ? [me.uid, activeChat.id] : [],
    }, {merge:true});
  };

  const searchUser = async () => {
    setSearchErr(""); setSearchRes(null); setSearchMsg("");
    const q = searchQ.trim().toLowerCase();
    if (!q) return;
    if (q === (me.username||"").toLowerCase()) { setSearchErr("That's your own username."); return; }
    const snap = await db.collection("users").where("username","==",q).limit(1).get();
    if (snap.empty) { setSearchErr("No user found with that username."); return; }
    const user = snap.docs[0].data();
    if (friends.find(f=>f.uid===user.uid)) { setSearchErr("Already in your circle."); return; }
    setSearchRes(user);
  };

  const sendFriendRequest = async (toUser) => {
    // write request to their subcollection
    await db.collection("users").doc(toUser.uid)
      .collection("friendRequests")
      .doc(me.uid)
      .set({ from: me.uid, fromName: me.displayName, status: "pending", createdAt: nowTs() });
    // notify them
    await db.collection("users").doc(toUser.uid)
      .collection("notifications")
      .add({ type:"friendRequest", from:me.uid, fromName:me.displayName, text:`${me.displayName} sent you a friend request.`, unread:true, createdAt:nowTs() });
    setSearchMsg(`Friend request sent to @${toUser.username}!`);
    setSearchRes(null);
  };

  const acceptRequest = async (req) => {
    const batch = db.batch();
    // add each to the other's friends subcollection
    batch.set(db.collection("users").doc(me.uid).collection("friends").doc(req.uid), { since: nowTs() });
    batch.set(db.collection("users").doc(req.uid).collection("friends").doc(me.uid), { since: nowTs() });
    // mark request done
    batch.update(db.collection("users").doc(me.uid).collection("friendRequests").doc(req.uid), { status:"accepted" });
    await batch.commit();
    // notify sender
    await db.collection("users").doc(req.uid).collection("notifications").add({
      type:"friendAccepted", from:me.uid, fromName:me.displayName,
      text:`${me.displayName} accepted your friend request.`, unread:true, createdAt:nowTs()
    });
  };

  const declineRequest = async (req) => {
    await db.collection("users").doc(me.uid).collection("friendRequests").doc(req.uid).update({ status:"declined" });
  };

  const createEvent = async () => {
    if (!nEv.title.trim()) return;
    const memberUids = [me.uid, ...friends.map(f=>f.uid)];
    await db.collection("events").add({
      title: nEv.title.trim(),
      date: nEv.date, time: nEv.time,
      location: nEv.location, description: nEv.description,
      creatorUid: me.uid, creatorName: me.displayName,
      memberUids,
      attendees: [{ uid: me.uid, name: me.displayName }],
      invited: friends.map(f=>({ uid:f.uid, name:f.displayName })),
      cover: COVERS[Math.floor(Math.random()*COVERS.length)],
      rsvps: { [me.uid]: "going" },
      createdAt: nowTs(),
    });
    setNEv({title:"",date:"",time:"",location:"",description:""});
    setModal(null); setTab("events");
  };

  const rsvpEvent = async (evId, rsvp) => {
    await db.collection("events").doc(evId).update({ [`rsvps.${me.uid}`]: rsvp });
  };

  const sharePhoto = async () => {
    const cols = ["#c9a96e","#9e7a8c","#7a8fa6","#6b8c6e","#a67c52","#8c8c7a"];
    await db.collection("photos").add({
      ownerUid: me.uid, ownerName: me.displayName,
      caption: pCap.trim()||"A moment.",
      likes: [], color: cols[Math.floor(Math.random()*cols.length)],
      createdAt: nowTs(),
    });
    setPCap(""); setModal(null);
  };

  const toggleLike = async (photo) => {
    const likes = photo.likes || [];
    const already = likes.includes(me.uid);
    await db.collection("photos").doc(photo.id).update({
      likes: already
        ? firebase.firestore.FieldValue.arrayRemove(me.uid)
        : firebase.firestore.FieldValue.arrayUnion(me.uid)
    });
  };

  const markNotifRead = async (nid) => {
    await db.collection("users").doc(me.uid).collection("notifications").doc(nid).update({ unread:false });
  };

  const signOut = async () => {
    await db.collection("users").doc(me.uid).update({ online: false });
    await auth.signOut();
  };

  // ── Derived ─────────────────────────────────────────────
  const unread = notifs.filter(n=>n.unread).length + requests.length;
  const myProfile = { ...me, username: me._username };

  const navs = [
    { id:"chat",          n:"chat",     badge: false },
    { id:"friends",       n:"users",    badge: requests.length > 0 },
    { id:"events",        n:"calendar", badge: false },
    { id:"photos",        n:"image",    badge: false },
    { id:"notifications", n:"bell",     badge: unread > 0 },
  ];

  // ── CHAT ────────────────────────────────────────────────
  const Chat = () => {
    const peer = activeChat?.type==="dm" ? friends.find(f=>f.uid===activeChat.id) : null;
    return (
      <>
        <div className="panel">
          <div className="ph">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
              <span className="pt">Messages</span>
            </div>
            {friends.length>0 && <div className="sw"><I n="search" s={13} c="#3a3a3a"/><input className="si" placeholder="Search…"/></div>}
          </div>
          <div className="pl">
            {friends.length===0 && (
              <div className="empty" style={{padding:28}}>
                <I n="chat" s={30} c="#1e1e1e"/>
                <p>Add friends to start chatting.</p>
                <button className="btn gold" style={{marginTop:8}} onClick={()=>setTab("friends")}>Find friends</button>
              </div>
            )}
            {friends.map(u => {
              const cid_ = chatId(me.uid, u.uid);
              const lastMsg = null; // could cache last messages per chat
              return (
                <div key={u.uid} className={`pi${activeChat?.type==="dm"&&activeChat.id===u.uid?" on":""}`} onClick={()=>setActiveChat({type:"dm",id:u.uid})}>
                  <Av user={u} size={38} dot/>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <div style={{fontSize:13,fontWeight:500,color:"#ddd8cc"}}>{u.displayName}</div>
                    <div style={{fontSize:12,color:"#484848"}}>@{u.username}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="main">
          {activeChat && peer ? (
            <>
              <div className="mh">
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Av user={peer} size={36} dot/>
                  <div>
                    <div style={{fontSize:14,fontWeight:500,color:"#eee8dd"}}>{peer.displayName}</div>
                    <div style={{fontSize:11,color:"#3a3a3a"}}>@{peer.username} · {peer.online?"online":"offline"}</div>
                  </div>
                </div>
                <button className="btn ghost" style={{fontSize:12,padding:"4px 11px"}} onClick={()=>setSharingLoc(s=>!s)}>
                  <I n="location" s={12}/> {sharingLoc?"Stop":"Share location"}
                </button>
              </div>
              {sharingLoc && (
                <div className="lbar">
                  <div className="pulse" style={{width:7,height:7,borderRadius:"50%",background:"#6db87a"}}/>
                  <span style={{fontSize:12,color:"#6db87a"}}>Sharing live location</span>
                  <button onClick={()=>setSharingLoc(false)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#484848"}}>Stop</button>
                </div>
              )}
              <div className="ca">
                {messages.length===0 && <div className="empty"><I n="chat" s={30} c="#1e1e1e"/><p>No messages yet. Say hi!</p></div>}
                {messages.map(m => (
                  <div key={m.id} className={`msg${m.from===me.uid?" me":""} fade`}>
                    {m.from!==me.uid && <Av user={peer} size={28}/>}
                    <div>
                      <div className="bbl">{m.text}</div>
                      <div className="mt">{m.createdAt ? fmtTime(m.createdAt) : ""}</div>
                    </div>
                  </div>
                ))}
                <div ref={endRef}/>
              </div>
              <div className="ia">
                <div className="ir">
                  <textarea className="ci" placeholder="Write a message…" rows={1} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}/>
                  <button className="sb" onClick={sendMessage}><I n="send" s={12} c="#0a0a0a"/></button>
                </div>
              </div>
            </>
          ) : (
            <div className="empty">
              <I n="chat" s={40} c="#181818"/>
              <p>{friends.length===0 ? "Add friends to start chatting." : "Select a conversation."}</p>
            </div>
          )}
        </div>
      </>
    );
  };

  // ── FRIENDS ─────────────────────────────────────────────
  const Friends = () => (
    <>
      <div className="panel">
        <div className="ph">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
            <span className="pt">Friends</span>
            <button className="btn gold" style={{padding:"4px 12px",fontSize:12}} onClick={()=>{setSearchQ("");setSearchRes(null);setSearchErr("");setSearchMsg("");setModal("add-friend");}}>+ Add</button>
          </div>
          {friends.length>0 && <div className="sw"><I n="search" s={13} c="#3a3a3a"/><input className="si" placeholder="Search…" value={fSearch} onChange={e=>setFSearch(e.target.value)}/></div>}
        </div>
        <div className="pl">
          {/* Pending requests */}
          {requests.map(req => (
            <div key={req.uid} className="fr-req">
              <Av user={req} size={38}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"#ddd"}}>{req.fromName}</div>
                <div style={{fontSize:11,color:"#c9a96e"}}>friend request</div>
              </div>
              <div className="fr-req-actions">
                <button className="btn gold" style={{padding:"4px 10px",fontSize:11}} onClick={()=>acceptRequest(req)}>Accept</button>
                <button className="btn ghost" style={{padding:"4px 8px",fontSize:11}} onClick={()=>declineRequest(req)}>✕</button>
              </div>
            </div>
          ))}
          {friends.length===0 && requests.length===0 ? (
            <div className="empty" style={{padding:28}}>
              <I n="users" s={30} c="#1e1e1e"/>
              <p>No friends yet. Add someone by their username.</p>
              <button className="btn gold" style={{marginTop:8}} onClick={()=>setModal("add-friend")}>Add friend</button>
            </div>
          ) : friends.filter(u=>!fSearch||u.displayName.toLowerCase().includes(fSearch.toLowerCase())||u.username.includes(fSearch.toLowerCase())).map(u=>(
            <div key={u.uid} className="pi" onClick={()=>{setViewUser(u);setTab("profile");}}>
              <Av user={u} size={40} dot/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:"#ddd8cc"}}>{u.displayName}</div>
                <div style={{fontSize:12,color:"#484848"}}>@{u.username}{u.location?` · ${u.location}`:""}</div>
              </div>
              <button className="btn ghost" style={{fontSize:11,padding:"3px 9px"}} onClick={e=>{e.stopPropagation();setActiveChat({type:"dm",id:u.uid});setTab("chat");}}>Message</button>
            </div>
          ))}
        </div>
      </div>
      <div className="main" style={{alignItems:"center",justifyContent:"center"}}>
        <div className="empty">
          <I n="users" s={40} c="#181818"/>
          <p style={{maxWidth:240}}>{friends.length===0 ? "Your circle is empty. Add friends by username to get started." : `${friends.length} friend${friends.length!==1?"s":""}. Select one to view their profile.`}</p>
          {friends.length===0 && <button className="btn gold" style={{marginTop:10}} onClick={()=>setModal("add-friend")}>+ Add a friend</button>}
        </div>
      </div>
    </>
  );

  // ── EVENTS ──────────────────────────────────────────────
  const Events = () => (
    <>
      <div className="panel">
        <div className="ph">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span className="pt">Events</span>
            <button className="btn gold" style={{padding:"4px 12px",fontSize:12}} onClick={()=>setModal("new-event")}>+ Create</button>
          </div>
        </div>
        <div className="pl" style={{padding:"10px 12px"}}>
          {events.length===0 && <div className="empty" style={{padding:28}}><I n="calendar" s={30} c="#1e1e1e"/><p>No events yet.</p></div>}
          {events.map(ev => {
            const myRsvp = ev.rsvps?.[me.uid] || "invited";
            return (
              <div key={ev.id} className={`evc${activeEv?.id===ev.id?" sel":""}`} onClick={()=>setActiveEv(ev)}>
                <div className={`ecv ${ev.cover}`}/>
                <div className="ecb">
                  <div style={{fontSize:13,fontWeight:500,color:"#eee8dd",marginBottom:2}}>{ev.title}</div>
                  <div style={{fontSize:11,color:"#555"}}>{ev.date||"Date TBD"}{ev.time?` · ${ev.time}`:""}</div>
                  {ev.location&&<div style={{fontSize:11,color:"#484848",display:"flex",gap:3,marginTop:2,alignItems:"center"}}><I n="pin" s={10}/>{ev.location}</div>}
                  <div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#484848"}}>{(ev.attendees||[]).length} going</div>
                    <span className={`tag t${myRsvp[0]}`}>{myRsvp}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="main">
        {activeEv ? (
          <div style={{flex:1,overflow:"auto"}}>
            <div className={`ecv ${activeEv.cover}`} style={{height:170,position:"relative"}}>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,#090909)"}}/>
              <div style={{position:"absolute",bottom:16,left:22}}>
                <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"#f5f0e8"}}>{activeEv.title}</h1>
              </div>
            </div>
            <div style={{padding:"20px 24px"}}>
              <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
                {["going","maybe","can't go"].map(r=>(
                  <button key={r} className={`btn${(activeEv.rsvps?.[me.uid]||"invited")===r?" gold":" ghost"}`} style={{padding:"4px 12px",fontSize:12}} onClick={()=>rsvpEvent(activeEv.id,r)}>
                    {r.charAt(0).toUpperCase()+r.slice(1)}
                  </button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                {[["Date & Time",activeEv.date?`${activeEv.date}${activeEv.time?" · "+activeEv.time:""}` :"TBD"],["Location",activeEv.location||"TBD"],["Hosted by",activeEv.creatorName],["Attending",`${(activeEv.attendees||[]).length} going`]].map(([l,v])=>(
                  <div key={l} style={{background:"#0c0c0c",border:"1px solid #181818",borderRadius:9,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"#484848",letterSpacing:".06em",textTransform:"uppercase",marginBottom:2}}>{l}</div>
                    <div style={{fontSize:13,color:"#ccc"}}>{v}</div>
                  </div>
                ))}
              </div>
              {activeEv.description&&<p style={{fontSize:13,color:"#999",lineHeight:1.7,marginBottom:18}}>{activeEv.description}</p>}
              {activeEv.location&&(
                <div style={{background:"#091409",border:"1px solid #141e14",borderRadius:9,padding:"11px 13px",display:"flex",gap:9,alignItems:"center"}}>
                  <I n="map" s={16} c="#6db87a"/>
                  <div><div style={{fontSize:13,color:"#ccc"}}>{activeEv.location}</div><div style={{fontSize:11,color:"#484848"}}>Open in maps</div></div>
                </div>
              )}
            </div>
          </div>
        ) : (
          <div className="empty">
            <I n="calendar" s={40} c="#181818"/>
            <p>{events.length===0 ? "Create your first event." : "Select an event."}</p>
            {events.length===0 && <button className="btn gold" style={{marginTop:10}} onClick={()=>setModal("new-event")}>+ Create event</button>}
          </div>
        )}
      </div>
    </>
  );

  // ── PHOTOS ──────────────────────────────────────────────
  const Photos = () => (
    <div className="main" style={{padding:24,overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20}}>
        <div>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:300,color:"#f0ebe0"}}>Moments</h2>
          <p style={{color:"#484848",fontSize:12,marginTop:2}}>Friends-only.</p>
        </div>
        <button className="btn gold" style={{fontSize:12}} onClick={()=>setModal("photo")}>+ Share</button>
      </div>
      {photos.length===0 ? (
        <div className="empty" style={{height:"auto",paddingTop:50}}>
          <I n="image" s={40} c="#181818"/>
          <p>No photos yet. Share a moment with your circle.</p>
          <button className="btn gold" style={{marginTop:10}} onClick={()=>setModal("photo")}>Share a photo</button>
        </div>
      ) : (
        <div className="pgrid">
          {photos.map(ph => {
            const isLiked = (ph.likes||[]).includes(me.uid);
            return (
              <div key={ph.id} className="pc">
                <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,${ph.color}44,${ph.color}18)`}}/>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><I n="image" s={34} c={ph.color+"88"}/></div>
                <div className="pov">
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <Av user={{uid:ph.ownerUid,displayName:ph.ownerName}} size={20}/>
                    <span style={{fontSize:12,color:"#ddd"}}>{ph.ownerName}</span>
                    <span style={{fontSize:10,color:"#666",marginLeft:"auto"}}>{ph.createdAt?fmtTime(ph.createdAt):""}</span>
                  </div>
                  <div style={{fontSize:12,color:"#bbb",marginBottom:6}}>{ph.caption}</div>
                  <button onClick={()=>toggleLike(ph)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:isLiked?"#c9703a":"#888",fontSize:12}}>
                    <I n={isLiked?"heartF":"heart"} s={13} c={isLiked?"#c9703a":"#888"}/>{(ph.likes||[]).length}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ── NOTIFICATIONS ────────────────────────────────────────
  const Notifs = () => (
    <div className="main" style={{overflow:"auto"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid #141414",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:400,color:"#f0ebe0"}}>Notifications</h2>
        {unread>0 && <button className="btn ghost" style={{fontSize:11}} onClick={()=>notifs.filter(n=>n.unread).forEach(n=>markNotifRead(n.id))}>Mark all read</button>}
      </div>
      {notifs.length===0
        ? <div className="empty"><I n="bell" s={40} c="#181818"/><p>Nothing here yet.</p></div>
        : notifs.map(n=>(
          <div key={n.id} className={`nf${n.unread?" ur":""}`} onClick={()=>markNotifRead(n.id)}>
            <Av user={{uid:n.from,displayName:n.fromName||"?"}} size={38}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{n.text}</div>
              <div style={{fontSize:11,color:"#383838",marginTop:2}}>{n.createdAt?fmtTime(n.createdAt):""}</div>
            </div>
            {n.unread && <div className="ndot"/>}
          </div>
        ))
      }
    </div>
  );

  // ── PROFILE ──────────────────────────────────────────────
  const pu = tab==="profile" && viewUser ? viewUser : { ...me, username: me._username };
  const isMe = pu.uid === me.uid;
  const Profile = () => (
    <div className="main">
      <div className="pp">
        <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:26}}>
          <Av user={pu} size={76} dot/>
          <div style={{flex:1}}>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:300,color:"#f0ebe0"}}>{pu.displayName||pu.name}</h1>
            <div style={{fontSize:13,color:"#555",marginBottom:4}}>@{pu.username}</div>
            {pu.bio && <p style={{fontSize:13,color:"#888",lineHeight:1.6,marginBottom:5}}>{pu.bio}</p>}
            {pu.location && <div style={{fontSize:12,color:"#484848",display:"flex",gap:4,alignItems:"center"}}><I n="pin" s={12}/>{pu.location}</div>}
            {!isMe && (
              <div style={{display:"flex",gap:7,marginTop:12}}>
                <button className="btn gold" onClick={()=>{setActiveChat({type:"dm",id:pu.uid});setTab("chat");}}>Message</button>
                {friends.find(f=>f.uid===pu.uid)
                  ? <button className="btn ghost">Friends ✓</button>
                  : <button className="btn gold" onClick={()=>sendFriendRequest(pu)}>+ Add</button>
                }
              </div>
            )}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:22}}>
          {[["Friends",friends.length],["Events",events.filter(e=>e.memberUids?.includes(pu.uid)).length],["Photos",photos.filter(p=>p.ownerUid===pu.uid).length]].map(([l,v])=>(
            <div key={l} className="st">
              <div style={{fontSize:20,fontFamily:"'Cormorant Garamond',serif",color:"#c9a96e"}}>{v}</div>
              <div style={{fontSize:11,color:"#484848",marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        {isMe && (
          <button className="btn ghost" style={{fontSize:12,display:"flex",alignItems:"center",gap:5}} onClick={signOut}>
            <I n="logout" s={13}/> Sign out
          </button>
        )}
      </div>
    </div>
  );

  // ── MODALS ───────────────────────────────────────────────
  const Modal = () => {
    if (!modal) return null;
    return (
      <div className="ov" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        {modal==="add-friend" && (
          <div className="modal fade">
            <div className="mhdr">
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#f0ebe0"}}>Add a Friend</span>
              <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
            </div>
            <div className="mbody">
              <p style={{fontSize:13,color:"#555",marginBottom:16,lineHeight:1.6}}>Search by username to find real users.</p>
              <div className="field">
                <label>Username</label>
                <div style={{display:"flex",gap:8}}>
                  <div style={{position:"relative",flex:1}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#444",fontSize:14}}>@</span>
                    <input style={{paddingLeft:24}} placeholder="username" value={searchQ} onChange={e=>{setSearchQ(e.target.value.replace(/\s/g,"").toLowerCase());setSearchRes(null);setSearchErr("");setSearchMsg("");}} onKeyDown={e=>e.key==="Enter"&&searchUser()} autoFocus/>
                  </div>
                  <button className="btn gold" onClick={searchUser}>Search</button>
                </div>
              </div>
              {searchErr && <div className="warn">{searchErr}</div>}
              {searchMsg && <div className="ok">{searchMsg}</div>}
              {searchRes && (
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px",background:"#0e0e0e",borderRadius:11,border:"1px solid #1e1e1e",marginTop:4}}>
                  <Av user={searchRes} size={44}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,color:"#ddd8cc",fontWeight:500}}>{searchRes.displayName}</div>
                    <div style={{fontSize:12,color:"#555"}}>@{searchRes.username}{searchRes.location?` · ${searchRes.location}`:""}</div>
                    {searchRes.bio && <div style={{fontSize:12,color:"#484848",marginTop:2}}>{searchRes.bio}</div>}
                  </div>
                  <button className="btn gold" onClick={()=>sendFriendRequest(searchRes)}>+ Add</button>
                </div>
              )}
            </div>
          </div>
        )}

        {modal==="new-event" && (
          <div className="modal fade">
            <div className="mhdr">
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#f0ebe0"}}>Create Event</span>
              <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
            </div>
            <div className="mbody">
              <div className="field"><label>Name *</label><input placeholder="e.g. Rooftop Aperitivo" value={nEv.title} onChange={e=>setNEv(n=>({...n,title:e.target.value}))} autoFocus/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                <div className="field"><label>Date</label><input type="date" value={nEv.date} onChange={e=>setNEv(n=>({...n,date:e.target.value}))}/></div>
                <div className="field"><label>Time</label><input type="time" value={nEv.time} onChange={e=>setNEv(n=>({...n,time:e.target.value}))}/></div>
              </div>
              <div className="field">
                <label>Location</label>
                <div style={{position:"relative"}}>
                  <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><I n="pin" s={12} c="#c9a96e"/></div>
                  <input style={{paddingLeft:28}} placeholder="Address or place name" value={nEv.location} onChange={e=>setNEv(n=>({...n,location:e.target.value}))}/>
                </div>
              </div>
              <div className="field"><label>Description</label><textarea placeholder="What's the plan?" value={nEv.description} onChange={e=>setNEv(n=>({...n,description:e.target.value}))}/></div>
              {friends.length===0 && <div className="warn" style={{marginBottom:12}}>Add friends first so you can invite them.</div>}
              <button className="btn gold" style={{width:"100%",padding:11}} onClick={createEvent} disabled={!nEv.title.trim()}>Create Event</button>
            </div>
          </div>
        )}

        {modal==="photo" && (
          <div className="modal fade">
            <div className="mhdr">
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#f0ebe0"}}>Share a Moment</span>
              <button style={{background:"none",border:"none",color:"#484848",cursor:"pointer"}} onClick={()=>setModal(null)}><I n="x" s={18}/></button>
            </div>
            <div className="mbody">
              <div style={{border:"2px dashed #1c1c1c",borderRadius:11,padding:"38px 20px",textAlign:"center",marginBottom:14,cursor:"pointer"}}>
                <I n="image" s={34} c="#2a2a2a"/>
                <p style={{color:"#484848",fontSize:13,marginTop:8}}>Select a photo to share</p>
                <p style={{color:"#2a2a2a",fontSize:11,marginTop:3}}>Visible to friends only</p>
              </div>
              <div className="field"><label>Caption</label><input placeholder="Write something…" value={pCap} onChange={e=>setPCap(e.target.value)} autoFocus/></div>
              <button className="btn gold" style={{width:"100%",padding:11}} onClick={sharePhoto}>Share</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── RENDER ───────────────────────────────────────────────
  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="sidebar">
          <div style={{marginBottom:12,cursor:"pointer"}} onClick={()=>{setViewUser(null);setTab("profile");}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#c9a96e14,#c9a96e38)",border:"1px solid #c9a96e2a",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"#c9a96e",lineHeight:1}}>✦</span>
            </div>
          </div>
          <div style={{height:1,background:"#141414",width:32,marginBottom:4}}/>
          {navs.map(item=>(
            <button key={item.id} className={`nb${tab===item.id?" on":""}`} onClick={()=>setTab(item.id)}>
              <I n={item.n} s={18}/>
              {item.badge && <div className="bdg"/>}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button className="nb" onClick={()=>{setViewUser(null);setTab("profile");}} title="Profile">
            <Av user={me} size={28}/>
          </button>
        </div>

        {tab==="chat"          && <Chat/>}
        {tab==="friends"       && <Friends/>}
        {tab==="events"        && <Events/>}
        {tab==="photos"        && <Photos/>}
        {tab==="notifications" && <Notifs/>}
        {tab==="profile"       && <Profile/>}
        <Modal/>
      </div>
    </>
  );
}

/* ─────────────────────────────────────────────
   ROOT — auth gate
───────────────────────────────────────────── */
function Root() {
  const [user, setUser]       = useState(undefined); // undefined = loading
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async fbUser => {
      if (fbUser) {
        // fetch Firestore profile
        const doc = await db.collection("users").doc(fbUser.uid).get();
        if (doc.exists) {
          setProfile({ ...doc.data(), _username: doc.data().username });
        } else {
          // profile not created yet (edge case)
          setProfile({ uid: fbUser.uid, displayName: fbUser.displayName||"User", _username:"" });
        }
        setUser(fbUser);
      } else {
        setUser(null);
        setProfile(null);
      }
    });
    return unsub;
  }, []);

  if (user === undefined) {
    return (
      <>
        <style>{CSS}</style>
        <div style={{height:"100dvh",background:"#060606",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:"#c9a96e",marginBottom:20}}>✦ Cercle</div>
            <Spinner/>
          </div>
        </div>
      </>
    );
  }

  if (!user) return <><style>{CSS}</style><AuthScreen/></>;

  return <MainApp me={profile}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
